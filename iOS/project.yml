name: Cardwatch
options:
  bundleIdPrefix: com.shimondeitel.cardwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cardwatch:
    type: application
    platform: iOS
    sources:
      - path: Cardwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cardwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CardwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CardwatchTests
      - path: Cardwatch.storekit
    dependencies:
      - target: Cardwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CardwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CardwatchUITests
    dependencies:
      - target: Cardwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cardwatch:
    build:
      targets:
        Cardwatch: all
        CardwatchTests: [test]
        CardwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cardwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Cardwatch.storekit
      targets:
        - CardwatchTests
        - CardwatchUITests
    archive:
      config: Release
